name: Build & Deploy to Azure Web App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login en ACR
        uses: azure/docker-login@v2
        with:
          login-server: fondosairegistry.azurecr.io
          username: fondosairegistry
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build y Push imagen
        run: |
          docker build -t fondosairegistry.azurecr.io/fondos-ai:${{ github.sha }} .
          docker push fondosairegistry.azurecr.io/fondos-ai:${{ github.sha }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: fondos-ai-app
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: fondosairegistry.azurecr.io/fondos-ai:${{ github.sha }}
